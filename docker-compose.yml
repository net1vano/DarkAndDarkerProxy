services:
  game-proxy:
    build: .
    container_name: game-proxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:8080"
      - "20000-20500:20000-20500"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: "bridge"